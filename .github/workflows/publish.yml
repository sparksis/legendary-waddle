name: Publish Tor Relay Image

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  publish-ghcr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.6.1
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=pr
            type=sha
            type=raw,value=snapshot
          sep-tags: " "

      - name: Log in to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GHCR
        id: publish
        uses: chainguard-images/actions/apko-publish@02af444f58bd4beb9611d234997a860fa94d1cf8 # v1.0.22
        with:
          config: apko.yaml
          tag: ${{ steps.meta.outputs.tags }}
          keyring-append: keys/alpine-devel@lists.alpinelinux.org-616ae350.rsa.pub
          archs: x86_64,aarch64

      - name: Extract Digest
        id: digest
        run: |
          # apko-publish outputs the full reference, e.g., repo@sha256:xxx
          # We need just the sha256:xxx part for the attestation action
          RAW_DIGEST="${{ steps.publish.outputs.digest }}"
          DIGEST=$(echo "${RAW_DIGEST}" | cut -d'@' -f2)
          echo "value=${DIGEST}" >> $GITHUB_OUTPUT

      - name: Attest Image
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2.2.3
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.digest.outputs.value }}
          push-to-registry: true
