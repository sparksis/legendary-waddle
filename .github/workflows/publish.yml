name: Publish Tor Relay Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  publish-ghcr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup apko
        uses: chainguard-dev/actions/setup-apko@f45211d3e8f9d2676c6b8cdd6a765435e06c819d # v1.6.13

      - name: Publish to GHCR
        run: |
          apko publish apko.yaml ghcr.io/${{ github.repository }}:latest --arch x86_64,aarch64
