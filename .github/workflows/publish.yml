name: Publish Tor Relay Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  publish-ghcr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.6.1
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup apko
        uses: chainguard-dev/actions/setup-apko@f45211d3e8f9d2676c6b8cdd6a765435e06c819d # v1.6.13

      - name: Publish to GHCR
        id: publish
        run: |
          # Use first tag from metadata as primary
          TAG="${{ steps.meta.outputs.tags }}"
          TAG_FIRST=$(echo "$TAG" | head -n 1)
          
          apko publish apko.yaml $TAG_FIRST --arch x86_64,aarch64 --image-refs output.images
          
          # Extract digest for attestation
          DIGEST=$(cat output.images | head -n 1 | cut -d'@' -f2)
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

      - name: Attest Image
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2.2.3
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.publish.outputs.digest }}
          push-to-registry: true
