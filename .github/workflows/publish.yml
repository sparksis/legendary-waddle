name: Publish Tor Relay Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  publish-ghcr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GHCR
        uses: chainguard-dev/actions/apko-publish@v0.1.1
        with:
          config: apko.yaml
          tag: ghcr.io/${{ github.repository }}:latest
          keyring-append: keys/alpine-devel@lists.alpinelinux.org-616ae350.rsa.pub
          archs: x86_64,aarch64
