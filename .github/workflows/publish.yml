name: Publish Tor Relay Image

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  publish-ghcr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v5.6.1
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=pr
            type=sha
            type=raw,value=snapshot
          sep-tags: " "

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GHCR
        id: publish
        uses: chainguard-images/actions/apko-publish@1db7b1f97da9425b3e8e9846dc3ca2b16c65f55d # v1.0.22
        with:
          config: apko.yaml
          tag: ${{ steps.meta.outputs.tags }}
          keyring-append: keys/alpine-devel@lists.alpinelinux.org-616ae350.rsa.pub
          archs: x86_64,aarch64

      - name: Extract Digest
        id: digest
        run: |
          # apko-publish outputs the full reference, e.g., repo@sha256:xxx
          # We need just the sha256:xxx part for the attestation action
          RAW_DIGEST="${{ steps.publish.outputs.digest }}"
          DIGEST=$(echo "${RAW_DIGEST}" | cut -d'@' -f2)
          echo "value=${DIGEST}" >> $GITHUB_OUTPUT

      - name: Attest Image
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.2.3
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.digest.outputs.value }}
          push-to-registry: true

  verify:
    needs: publish-ghcr
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: |
          # Use the SHA tag for precise testing of the built image
          IMAGE="ghcr.io/${{ github.repository }}:sha-${GITHUB_SHA::7}"
          docker pull $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Run container
        run: |
          docker run -d --name test-relay \
            -e TOR_NICKNAME=TestRelay \
            -e TOR_BANDWIDTH_RATE="1 MByte" \
            -e TOR_BANDWIDTH_BURST="2 MByte" \
            $IMAGE

      - name: Wait and check logs
        run: |
          echo "Waiting for Tor to start (15s)..."
          sleep 15
          LOGS=$(docker logs test-relay)
          echo "--- CONTAINER LOGS ---"
          echo "$LOGS"
          echo "-----------------------"
          
          if echo "$LOGS" | grep -q "Unable to parse"; then
            echo "❌ FAILED: Found variable expansion error in logs."
            exit 1
          fi
          
          if echo "$LOGS" | grep -q "Reading config failed"; then
            echo "❌ FAILED: Tor failed to read configuration."
            exit 1
          fi
          
          if echo "$LOGS" | grep -q "Bootstrapped"; then
            echo "✅ SUCCESS: Tor started and began bootstrapping."
          else
            echo "⚠️ WARNING: Tor did not report bootstrapping yet, but no critical errors found."
          fi

      - name: Cleanup
        if: always()
        run: docker rm -f test-relay
