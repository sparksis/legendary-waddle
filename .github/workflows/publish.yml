name: Publish Tor Relay Matrix

on:
  push:
    branches: [ main, 'refactor/*', 'feat/*' ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - alpine: "edge"
            is_latest: true
          - alpine: "v3.23"
            is_latest: false
            alias: "stable"
          - alpine: "v3.22"
            is_latest: false
            alias: "oldstable"

    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate apko.yaml
        run: |
          export ALPINE_RELEASE=${{ matrix.alpine }}
          envsubst < apko.yaml.tmpl > apko.yaml
          cat apko.yaml

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup apko
        uses: chainguard-dev/actions/setup-apko@main

      - name: Determine Tags
        id: tags
        run: |
          BASE="ghcr.io/${{ github.repository }}"
          TAGS="$BASE:${{ matrix.alpine }}"
          
          if [ "${{ matrix.is_latest }}" = "true" ]; then
            TAGS="$TAGS,$BASE:latest,$BASE:edge,$BASE:edge-alpine-edge"
          fi
          
          if [ -n "${{ matrix.alias }}" ]; then
            TAGS="$TAGS,$BASE:${{ matrix.alias }}-alpine${{ matrix.alpine }}"
          fi
          
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Publish to GHCR
        id: publish-ghcr
        uses: chainguard-images/actions/apko-publish@1db7b1f97da9425b3e8e9846dc3ca2b16c65f55d # v1.0.22
        with:
          config: apko.yaml
          tag: ${{ steps.tags.outputs.tags }}
          keyring-append: keys/alpine-devel@lists.alpinelinux.org-616ae350.rsa.pub
          archs: x86_64,aarch64

      - name: Generate SBOM
        run: |
          apko build apko.yaml tor-relay:${{ matrix.alpine }} output.tar --arch x86_64,aarch64 --sbom-path ./sbom-${{ matrix.alpine }}.spdx.json
          
      - name: Upload Build Assets
        uses: actions/upload-artifact@v4
        with:
          name: assets-${{ matrix.alpine }}
          path: |
            apko.yaml
            sbom-${{ matrix.alpine }}.spdx.json

      - name: Create Release Asset (on tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apko.yaml
            sbom-${{ matrix.alpine }}.spdx.json
          body: "Hardened Tor Relay Matrix Release - ${{ matrix.alpine }}"

      - name: Attest Image
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.2.3
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.publish-ghcr.outputs.digest }}
          push-to-registry: true
