contents:
  repositories:
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  keyring:
    - keys/alpine-devel@lists.alpinelinux.org-616ae350.rsa.pub
  packages:
    - tor
    - ca-certificates
    - musl

accounts:
  groups:
    - groupname: tor
      gid: 101
  users:
    - username: tor
      uid: 101
      gid: 101
  run-as: tor

environment:
  TOR_NICKNAME: ApkoRelay
  TOR_BANDWIDTH_RATE: 1 MByte
  TOR_BANDWIDTH_BURST: 2 MByte
  TOR_CONTACT: "operator@example.com"

entrypoint:
  command: /usr/bin/tor -f /etc/tor/torrc

paths:
  - path: /etc/tor/torrc
    source: torrc
    permissions: 0644
    uid: 101
    gid: 101
  - path: /var/lib/tor
    type: directory
    permissions: 0700
    uid: 101
    gid: 101

archs:
  - x86_64
  - aarch64
