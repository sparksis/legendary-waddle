contents:
  repositories:
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  packages:
    - alpine-keys
    - tor
    - ca-certificates
    - musl

accounts:
  groups:
    - groupname: tor
      gid: 100
  users:
    - username: tor
      uid: 100
      gid: 100
  run-as: tor

environment:
  TOR_NICKNAME: ApkoRelay
  TOR_BANDWIDTH_RATE: 1 MByte
  TOR_BANDWIDTH_BURST: 2 MByte
  TOR_CONTACT: none

entrypoint:
  command: /usr/bin/tor --Log "notice stdout" --ExitRelay 0 --ORPort 9001 --Nickname ${TOR_NICKNAME} --BandwidthRate ${TOR_BANDWIDTH_RATE} --BandwidthBurst ${TOR_BANDWIDTH_BURST} --ContactInfo ${TOR_CONTACT}

archs:
  - x86_64
  - aarch64
